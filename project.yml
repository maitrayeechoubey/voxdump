name: Voxdump

options:
  bundleIdPrefix: com.maitrayeechoubey
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.2"
    CURRENT_PROJECT_VERSION: "3"
    PRODUCT_NAME: Voxdump
    DEVELOPMENT_TEAM: "P463CJW3TA"   # Maitrayee Choubey (Individual) — from the distribution log
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  FocusFlow:
    type: application
    platform: iOS

    sources:
      - path: FocusFlow
        excludes:
          - "**/.DS_Store"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maitrayeechoubey.braindumpapp
        # App ships as Voxdump.app (PRODUCT_NAME) but keeps the Swift module name
        # "FocusFlow" so the test target's `@testable import FocusFlow` resolves.
        PRODUCT_MODULE_NAME: FocusFlow
        INFOPLIST_FILE: FocusFlow/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"

    entitlements:
      path: FocusFlow/FocusFlow.entitlements
      properties:
        com.apple.security.device.microphone: true

    info:
      path: FocusFlow/Info.plist
      properties:
        NSMicrophoneUsageDescription: "Voxdump uses your microphone to capture your thoughts so it can extract and organize your tasks."
        NSSpeechRecognitionUsageDescription: "Voxdump transcribes your speech on-device to turn your vox dump into an organized task list."
        CFBundleDisplayName: Voxdump
        # Wire the bundle version keys to the build settings above so bumping
        # MARKETING_VERSION / CURRENT_PROJECT_VERSION actually changes the shipped
        # version (previously Info.plist hardcoded 1.0 / 1 and silently won).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UILaunchScreen: {}

    preBuildScripts:
      - name: "Lint – SwiftFormat (optional, skip if not installed)"
        script: |
          if which swiftformat > /dev/null; then
            swiftformat --lint "$SRCROOT/FocusFlow"
          fi
        runOnlyWhenInstalling: false
        showEnvVarsInLog: false

  FocusFlowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FocusFlowTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maitrayeechoubey.braindumpapp.tests
        # Override the project-level PRODUCT_NAME (Voxdump) so the test bundle
        # doesn't also try to produce a Voxdump.swiftmodule and collide with the app.
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        # The app target is named "FocusFlow" but ships as PRODUCT_NAME "Voxdump",
        # so the built host is Voxdump.app/Voxdump — pin TEST_HOST to it (xcodegen
        # otherwise derives it from the target name and fails to find the host).
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Voxdump.app/Voxdump"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: FocusFlow

schemes:
  Voxdump:
    build:
      targets:
        FocusFlow: all
        FocusFlowTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FocusFlowTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
